name: Reference Docs

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "mkdocs.yml"
      - "scripts/build_docs.py"
      - "scripts/generate_context_docs.py"
      - "scripts/build_api_reference.py"
      - "docs/index.md"
      - "docs/changelog.md"
      - "docs/context_snapshot.md"
      - "docs/reference/**"
      - ".github/workflows/reference-docs.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "mkdocs.yml"
      - "scripts/build_docs.py"
      - "scripts/generate_context_docs.py"
      - "scripts/build_api_reference.py"
      - "docs/index.md"
      - "docs/changelog.md"
      - "docs/context_snapshot.md"
      - "docs/reference/**"
      - ".github/workflows/reference-docs.yml"

jobs:
  build-reference:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Docs Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Generate Docs Artifacts
        run: python scripts/build_docs.py --no-site-build

      - name: Verify Docs Artifacts Are Clean
        run: python scripts/build_docs.py --check --no-site-build

      - name: Upload Reference Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-docs
          path: |
            docs/reference
            docs/context_snapshot.md
